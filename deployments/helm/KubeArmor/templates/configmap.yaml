apiVersion: v1
data:
  defaultFilePosture: {{ .Values.kubearmorConfigMap.defaultFilePosture | quote }}
  defaultCapabilitiesPosture: {{ .Values.kubearmorConfigMap.defaultCapabilitiesPosture | quote }}
  defaultNetworkPosture: {{ .Values.kubearmorConfigMap.defaultNetworkPosture | quote }}
  visibility: {{ .Values.kubearmorConfigMap.visibility | quote }}
  alertThrottling: {{ .Values.kubearmorConfigMap.alertThrottling | quote }}
  maxAlertPerSec: {{ .Values.kubearmorConfigMap.maxAlertPerSec | quote }}
  throttleSec: {{ .Values.kubearmorConfigMap.throttleSec | quote }}
  matchArgs: {{ .Values.kubearmorConfigMap.matchArgs | quote }}
  karmor.yaml: | {{ toYaml .Values.kubearmorConfigMap | nindent 4 }}
  enableAPIObserver: {{ .Values.kubearmorConfigMap.enableAPIObserver | quote }}
  # API Observer: comma-separated :authority prefixes to block
  apiBlockedAuthorities: {{ .Values.kubearmorConfigMap.apiBlockedAuthorities | quote }}
  # API Observer: comma-separated ports to exclude from capture
  apiExcludedPorts: {{ .Values.kubearmorConfigMap.apiExcludedPorts | quote }}
  # API Observer: comma-separated K8s namespaces to observe (allowlist — mutually exclusive with apiBlockNamespaces)
  apiAllowNamespaces: {{ .Values.kubearmorConfigMap.apiAllowNamespaces | quote }}
  # API Observer: comma-separated K8s namespaces to exclude (blocklist — mutually exclusive with apiAllowNamespaces)
  apiBlockNamespaces: {{ .Values.kubearmorConfigMap.apiBlockNamespaces | quote }}
kind: ConfigMap
metadata:
  labels:
    kubearmor-app: kubearmor-configmap
  name: kubearmor-config
  namespace: {{ .Release.Namespace }}
