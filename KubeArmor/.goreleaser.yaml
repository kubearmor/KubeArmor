project_name: kubearmor

builds:
  - binary: "opt/kubearmor/kubearmor"
    id: kubearmor
    goos:
      - linux
    goarch:
      - amd64
    env:
      - CGO_ENABLED=0
    # Reproducible release builds (issue #2587):
    #   mod_timestamp pins the binary's timestamp to the commit time,
    #   -trimpath strips local filesystem paths,
    #   -buildid= removes the random build ID embedded by the Go linker.
    # With these set, two independent release runs of the same tag produce
    # byte-for-byte identical binaries, and `make build-reproducible` of the
    # same (clean) checkout reproduces the released binary.
    mod_timestamp: "{{ .CommitTimestamp }}"
    flags:
      - -trimpath
    ldflags:
      - -buildid=
      # Build info lives in the buildinfo package (the previous "main.*" targets
      # were silent no-ops). BuildDate is pinned to the commit timestamp so it is
      # deterministic; GitBranch is intentionally omitted because a branch name is
      # not a deterministic property of a commit.
      - "-X github.com/kubearmor/KubeArmor/KubeArmor/buildinfo.GitSummary={{ .Summary }}"
      - "-X github.com/kubearmor/KubeArmor/KubeArmor/buildinfo.BuildDate={{ .CommitTimestamp }}"

release:
  replace_existing_artifacts: true
  mode: replace
  make_latest: false

# to handle checksum name conflict
checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Env.ARCH }}_checksums.txt"

signs:
  - cmd: cosign
    signature: "${artifact}.sigstore.json"
    args:
      - sign-blob
      - "--bundle=${signature}"
      - '${artifact}'
      - --yes
    artifacts: all
    output: true
archives:
  - id: "kubearmor"
    builds:
      - "kubearmor"
    name_template: "{{.ProjectName}}_{{.Version}}_{{.Os}}-{{.Arch}}"
    files:
      - src: ./BPF/*
        dst: /opt/kubearmor/BPF/
      - src: ./templates/*
        dst: /opt/kubearmor/templates/
      - src: ./packaging/kubearmor.yaml
        dst: /opt/kubearmor/
        strip_parent: true
      - src: ./packaging/kubearmor.service
        dst: /usr/lib/systemd/system/
        strip_parent: true

nfpms:
  - id: "kubearmor"
    builds:
      - "kubearmor"
    formats:
      - deb
      - rpm
    replaces:
      - kubearmor
    maintainer: "Barun Acharya <barun.acharya@accuknox.com>"
    description: |
      Cloud-native Runtime Security Enforcement System
    vendor: "kubearmor"
    homepage: "https://kubearmor.com"
    license: "Apache 2"
    file_name_template: "{{.ProjectName}}_{{.Version}}_{{.Os}}-{{.Arch}}"
    bindir: /
    contents:
      - dst: /opt/kubearmor
        type: dir
      - src: ./BPF/*
        dst: /opt/kubearmor/BPF
      - src: ./templates/*
        dst: /opt/kubearmor/templates/
      - src: ./packaging/kubearmor.yaml
        dst: /opt/kubearmor/kubearmor.yaml
        type: config
      - src: ./packaging/kubearmor.service
        dst: /usr/lib/systemd/system/kubearmor.service
        type: config
      - src: /opt/kubearmor/kubearmor
        dst: /usr/local/bin/kubearmor
        type: symlink
    scripts:
      postinstall: packaging/post-install.sh
    overrides:
      deb:
        recommends:
          - make
          - libelf-dev
          - clang
          - llvm
          - linux-headers-generic
      rpm:
        recommends:
          - make
          - elfutils-libelf-devel
          - clang
          - llvm
          - kernel-devel
          - policycoreutils-devel
          - setools-console
