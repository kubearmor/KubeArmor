name: ci-systemd-release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag which has to be updated"
        type: "string"
        required: true
  push:
    tags:
      - "*"

# Declare default permissions as read only.
permissions: read-all

jobs:
  goreleaser:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - arch: amd64
            os: ubuntu-22.04
          - arch: arm64
            os: ubuntu-22.04-arm
    if: github.repository == 'kubearmor/kubearmor'
    permissions:
      id-token: write    # required for cosign keyless signing
      contents: write    # required for goreleaser to upload to GitHub release
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
    steps:
      - name: Validate version
        id: validate
        uses: actions/github-script@v7
        with:
          script: |
            const Regex = /^v(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)(?:-((?:0|[1-9]\d*|\d*[a-zA-Z-][0-9a-zA-Z-]*)(?:\.(?:0|[1-9]\d*|\d*[a-zA-Z-][0-9a-zA-Z-]*))*))?(?:\+([0-9a-zA-Z-]+(?:\.[0-9a-zA-Z-]+)*))?$/;
            const eventName = '${{ github.event_name }}';
            let version;

            if (eventName === 'push') {
              version = '${{ github.ref_name }}';
            } else {
              version = '${{ inputs.tag }}';
            }

            if (!Regex.test(version)) {
              console.log(`Invalid version format: ${version}`);
              core.setFailed(`Invalid version format: ${version}`);
            } else {
              console.log(`Valid version format: ${version}`);
              core.setOutput('release_tag', version);
            }

      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: 'KubeArmor/go.mod'

      - name: Install the latest LLVM toolchain
        run: ./.github/workflows/install-llvm.sh

      - name: Compile libbpf
        run: ./.github/workflows/install-libbpf.sh

      - name: Install Cosign
        uses: sigstore/cosign-installer@59acb6260d9c0ba8f4a2f9d9b48431a222b68e20 # v3.5.0

      - name: Install Syft (for SBOM generation)
        uses: anchore/sbom-action/download-syft@78fc58e266e87a38d4194b2137a3d4e9baf7c2c6 # v0.15.1

      - name: Install karmor
        run: curl -sfL https://raw.githubusercontent.com/kubearmor/kubearmor-client/main/install.sh | sudo sh -s -- -b .
        working-directory: KubeArmor

      - name: Build KubeArmor object files
        run: make
        working-directory: KubeArmor/BPF

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_AUTHTOK }}

      - name: Prepare environment from validated tag
        id: vars
        run: |
          RELEASE_TAG="${{ steps.validate.outputs.release_tag }}"
          echo "Using release tag: ${RELEASE_TAG}"
          echo "GORELEASER_CURRENT_TAG=${RELEASE_TAG}" >> $GITHUB_OUTPUT
          echo "tag=${RELEASE_TAG#v}" >> $GITHUB_OUTPUT
          cp KubeArmor/.goreleaser.yaml /tmp/.goreleaser.yaml
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "Checking out tag: ${RELEASE_TAG}"
            git checkout "${RELEASE_TAG}"
          fi

      - name: Install yq
        run: |
          wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_${{ matrix.arch }} -O /usr/local/bin/yq &&\
          chmod +x /usr/local/bin/yq
          yq --version

      - name: Patch goarch
        working-directory: KubeArmor
        run: |
          yq -i '.builds[0].goarch = ["${{ matrix.arch }}"]' /tmp/.goreleaser.yaml

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@5742e2a039330cbb23ebf35f046f814d4c6ff811 # v5
        with:
          distribution: goreleaser
          version: v1.25.0
          args: release --config=/tmp/.goreleaser.yaml
          workdir: KubeArmor
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ steps.vars.outputs.GORELEASER_CURRENT_TAG }}
          ARCH: ${{ matrix.arch }}

      - name: Compute artifact hashes for SLSA provenance
        id: hash
        if: matrix.arch == 'amd64'
        working-directory: KubeArmor/dist
        run: |
          echo "Computing SHA256 hashes for all release artifacts..."
          files=$(ls *.tar.gz *.deb *.rpm *.sbom.json 2>/dev/null | grep -v '\.sigstore\.json$' | grep -v 'arm64' | tr '\n' ' ')
          echo "Files to hash: $files"
          hashes=$(sha256sum $files | base64 -w0)
          echo "hashes=${hashes}" >> $GITHUB_OUTPUT
          echo "${hashes}" > /tmp/artifact-hashes.txt
          echo "Hashes computed successfully"

      - name: Upload artifact hashes
        if: matrix.arch == 'amd64'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: artifact-hashes
          path: /tmp/artifact-hashes.txt
          retention-days: 1

      - name: Verify signed artifacts exist
        working-directory: KubeArmor/dist
        run: |
          echo "=== Signed bundles (.sigstore.json) ==="
          ls -la *.sigstore.json || echo "WARNING: No .sigstore.json files found"
          echo "=== SBOM files ==="
          ls -la *.sbom.json || echo "WARNING: No SBOM files found"
          echo "=== All dist artifacts ==="
          ls -la

      - name: Verify release artifacts with cosign
        working-directory: KubeArmor/dist
        run: |
          for artifact in *.tar.gz *.deb *.rpm; do
            if [ -f "${artifact}" ] && [ -f "${artifact}.sigstore.json" ]; then
              echo "Verifying: ${artifact}"
              cosign verify-blob \
                --bundle "${artifact}.sigstore.json" \
                --certificate-identity-regexp "https://github.com/kubearmor/KubeArmor/.*" \
                --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
                "${artifact}" && echo "PASS: ${artifact}" || echo "FAIL: ${artifact}"
            fi
          done

      - name: Setup ORAS
        uses: oras-project/setup-oras@22ce207df3b08e061f537244349aac6ae1d214f6 # v1
        with:
          version: 1.0.0

      - name: Publish release artifacts to Dockerhub
        working-directory: KubeArmor/dist
        run: |
          oras push docker.io/kubearmor/kubearmor-systemd:${{ steps.vars.outputs.tag }}_linux-${{ matrix.arch }} kubearmor_${{ steps.vars.outputs.tag }}_linux-${{ matrix.arch }}.tar.gz

  aggregate-hashes:
    name: Aggregate artifact hashes for SLSA provenance
    needs: [goreleaser]
    if: github.repository == 'kubearmor/kubearmor'
    runs-on: ubuntu-22.04
    outputs:
      hashes: ${{ steps.load.outputs.hashes }}
    permissions:
      contents: read
    steps:
      - name: Download hashes artifact from amd64 job
        uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e # v4.2.1
        with:
          name: artifact-hashes
          path: /tmp/hashes
      - name: Load hashes
        id: load
        run: |
          hashes=$(cat /tmp/hashes/*)
          echo "hashes=${hashes}" >> $GITHUB_OUTPUT

  provenance:
    name: Generate SLSA provenance attestation
    needs: [aggregate-hashes]
    if: github.repository == 'kubearmor/kubearmor'
    permissions:
      actions: read
      id-token: write
      contents: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@5a775b367a56d5bd118a224a811bba288150a563 # v2.0.0
    with:
      base64-subjects: ${{ needs.aggregate-hashes.outputs.hashes }}
      upload-assets: true
      provenance-name: kubearmor.intoto.jsonl

  verify:
    name: Verify release artifacts end-to-end
    needs: [goreleaser, aggregate-hashes, provenance]
    if: github.repository == 'kubearmor/kubearmor'
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    env:
      TAG: ${{ github.ref_name != 'main' && github.ref_name || github.event.inputs.tag }}
    steps:
      - name: Install cosign
        uses: sigstore/cosign-installer@59acb6260d9c0ba8f4a2f9d9b48431a222b68e20 # v3.5.0

      - name: Install SLSA verifier
        run: |
          curl -sL https://github.com/slsa-framework/slsa-verifier/releases/download/v2.5.1/slsa-verifier-linux-amd64 -o slsa-verifier
          echo "17f5e624c5b41a357da654bd37fb92e563f40021809cf35d81730bb10011980e  slsa-verifier" | sha256sum --check
          chmod +x slsa-verifier
          sudo mv slsa-verifier /usr/local/bin/
          slsa-verifier version

      - name: Download release artifacts and provenance
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Downloading artifacts for tag: ${TAG}"
          gh release download "${TAG}" \
            --repo kubearmor/KubeArmor \
            --pattern "*.tar.gz" \
            --pattern "*.deb" \
            --pattern "*.rpm" \
            --pattern "*.sigstore.json" \
            --pattern "*.sbom.json" \
            --pattern "kubearmor.intoto.jsonl" \
            --dir ./artifacts
          ls -la ./artifacts

      - name: Verify artifacts with cosign
        working-directory: ./artifacts
        run: |
          echo "=== Verifying with cosign ==="
          for artifact in *.tar.gz *.deb *.rpm; do
            [ -f "${artifact}" ] || continue
            bundle="${artifact}.sigstore.json"
            if [ -f "${bundle}" ]; then
              echo "Verifying ${artifact}..."
              cosign verify-blob \
                --bundle "${bundle}" \
                --certificate-identity-regexp "https://github.com/kubearmor/KubeArmor/.*" \
                --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
                "${artifact}" && echo "PASS: ${artifact}" || echo "FAIL: ${artifact}"
            fi
          done

      - name: Verify SLSA provenance with slsa-verifier
        working-directory: ./artifacts
        run: |
          echo "=== Verifying SLSA provenance ==="
          for artifact in *.tar.gz *.deb *.rpm *.sbom.json; do
            [ -f "${artifact}" ] || continue
            echo "Verifying SLSA provenance for ${artifact}..."
            slsa-verifier verify-artifact "${artifact}" \
              --provenance-path kubearmor.intoto.jsonl \
              --source-uri github.com/kubearmor/KubeArmor \
              --source-tag "${TAG}" \
              && echo "SLSA PASS: ${artifact}" || echo "SLSA FAIL: ${artifact}"
          done

      - name: Verify container image signatures with cosign
        run: |
          echo "=== Verifying container image signatures ==="
          for image in kubearmor/kubearmor kubearmor/kubearmor-init kubearmor/kubearmor-ubi; do
            echo "Verifying ${image}:${TAG}..."
            cosign verify "${image}:${TAG}" \
              --certificate-identity-regexp "https://github.com/kubearmor/KubeArmor/.*" \
              --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
              && echo "PASS: ${image}" || echo "WARN: ${image} not yet signed - image signing runs in ci-latest-release.yml"
          done

      - name: Verify SBOM signatures with cosign
        working-directory: ./artifacts
        run: |
          echo "=== Verifying SBOM signatures ==="
          for sbom in *.sbom.json; do
            [ -f "${sbom}" ] || continue
            bundle="${sbom}.sigstore.json"
            if [ -f "${bundle}" ]; then
              echo "Verifying SBOM ${sbom}..."
              cosign verify-blob \
                --bundle "${bundle}" \
                --certificate-identity-regexp "https://github.com/kubearmor/KubeArmor/.*" \
                --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
                "${sbom}" && echo "PASS: ${sbom}" || echo "FAIL: ${sbom}"
            fi
          done
