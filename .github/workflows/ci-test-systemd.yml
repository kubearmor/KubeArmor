name: ci-test-systemd

on:
  push:
    branches: [main]
    paths:
      - "KubeArmor/**"
      - "tests/**"
      - "protobuf/**"
      - ".github/workflows/ci-test-systemd.yml"
  pull_request:
    branches: [main]
    paths:
      - "KubeArmor/**"
      - "tests/**"
      - "protobuf/**"
      - ".github/workflows/ci-test-systemd.yml"

# Declare default permissions as read only.
permissions: read-all

jobs:
  build:
    name: Test KubeArmor in Systemd Mode
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: true

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: 'KubeArmor/go.mod'

      - name: Install the latest LLVM toolchain
        run: ./.github/workflows/install-llvm.sh

      - name: Compile libbpf
        run: ./.github/workflows/install-libbpf.sh

      - name: Install GoReleaser
        uses: goreleaser/goreleaser-action@b953231f81b8dfd023c58e0854a721e35037f28b # v2
        with:
          install-only: true
          version: v1.25.0

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.11
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.6.1
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
    
      - name: Build Systemd Release
        run: make local-release
        working-directory: KubeArmor

      - name: Install KubeArmor
        run: sudo apt install -y ./dist/kubearmor*amd64.deb
        working-directory: KubeArmor

      - name: Configure KubeArmor mTLS for systemd tests
        run: |
          sudo systemctl stop kubearmor
          sudo install -d -m 0750 /var/lib/kubearmor/tls
          sudo install -d /etc/systemd/system/kubearmor.service.d
          sudo tee /etc/systemd/system/kubearmor.service.d/ci-mtls.conf >/dev/null <<'EOF'
          [Service]
          ExecStart=
          ExecStart=/opt/kubearmor/kubearmor -tlsCertProvider=dev -tlsCertPath=/var/lib/kubearmor/tls
          EOF
          sudo systemctl daemon-reload
          sudo systemctl restart kubearmor
          for file in ca.crt server.crt server.key client.crt client.key; do
            for i in {1..30}; do
              sudo test -s /var/lib/kubearmor/tls/$file && break
              sleep 1
            done
            sudo test -s /var/lib/kubearmor/tls/$file
          done
          for file in ca.crt server.crt server.key client.crt client.key; do
            for i in {1..30}; do
              sudo test -s /var/lib/kubearmor/tls/management/$file && break
              sleep 1
            done
            sudo test -s /var/lib/kubearmor/tls/management/$file
          done
          sudo chown "$USER:$USER" /var/lib/kubearmor/tls /var/lib/kubearmor/tls/ca.crt /var/lib/kubearmor/tls/client.crt /var/lib/kubearmor/tls/client.key
          sudo chown -R "$USER:$USER" /var/lib/kubearmor/tls/management
          sudo chmod 0750 /var/lib/kubearmor/tls
          sudo chmod 0600 /var/lib/kubearmor/tls/*
          sudo chmod 0750 /var/lib/kubearmor/tls/management
          sudo chmod 0600 /var/lib/kubearmor/tls/management/*

      - name: Check journalctl
        run: sudo journalctl -u kubearmor --no-pager
      
      - name: Test kubearmor using ginkgo 
        run: |
          go install -mod=mod github.com/onsi/ginkgo/v2/ginkgo
          make
        working-directory: ./tests/nonk8s_env
        env:
          KUBEARMOR_TLS_CERT_PATH: /var/lib/kubearmor/tls
        timeout-minutes: 30
        
      
