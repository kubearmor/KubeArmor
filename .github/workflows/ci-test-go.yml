name: ci-test-go

on:
  push:
    branches: [main]
    paths:
      - "KubeArmor/**"
      - "tests/**"
      - "protobuf/**"
      - ".github/workflows/ci-test-go.yml"
      - "pkg/KubeArmorOperator/**"
  pull_request:
    branches: [main]
    paths:
      - "KubeArmor/**"
      - "tests/**"
      - "protobuf/**"
      - ".github/workflows/ci-test-go.yml"
      - "pkg/KubeArmorOperator/**"
    
# Declare default permissions as read only.
permissions: read-all

jobs:
  go-fmt:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: 'KubeArmor/go.mod'

      - name: Check gofmt
        run: make gofmt
        working-directory: KubeArmor

  go-lint:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: 'KubeArmor/go.mod'

      - name: Run Revive Action on KubeArmor
        uses: morphy2k/revive-action@bd8016177e3722fe0aad85e22507805641be5bb1 # v2
        with:
          path: "./KubeArmor/..."

  go-lint-tests:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: 'KubeArmor/go.mod'

      - name: Run Revive Action on KubeArmor tests
        uses: morphy2k/revive-action@bd8016177e3722fe0aad85e22507805641be5bb1 # v2
        with:
          path: "./tests/..."

  go-sec:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: 'KubeArmor/go.mod'

      - name: Run Gosec Security Scanner
        run: make gosec
        working-directory: KubeArmor

  go-vuln:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: 'KubeArmor/go.mod'

      - name: Run govulncheck 
        run: make scan
        working-directory: KubeArmor

  go-test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: 'KubeArmor/go.mod'

      - name: Run go test on the KubeArmor/KubeArmor directory
        run: go test -coverprofile=coverage.out -covermode=atomic ./...
        working-directory: KubeArmor

      - name: Generate coverage report
        if: ${{ always() }}
        run: |
          if [ -f coverage.out ]; then
            go tool cover -func coverage.out
            echo "## Unit Test Coverage" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            go tool cover -func coverage.out | tail -1 >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "Coverage file not found." >> $GITHUB_STEP_SUMMARY
          fi
        working-directory: KubeArmor

      - name: Upload coverage report
        if: ${{ always() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: unit-test-coverage
          path: KubeArmor/coverage.out

  license:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Check License Header
        uses: apache/skywalking-eyes@ed436a5593c63a25f394ea29da61b0ac3731a9fe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
