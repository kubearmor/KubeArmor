name: ci-test-ubi-ginkgo

on:
  push:
    branches: [main]
    paths:
      - "KubeArmor/**"
      - "tests/**"
      - "protobuf/**"
      - ".github/workflows/ci-test-ubi-image.yml"
      - "pkg/KubeArmorOperator/**"
      - "deployments/helm/**"
  pull_request:
    branches: [main]
    paths:
      - "KubeArmor/**"
      - "tests/**"
      - "protobuf/**"
      - ".github/workflows/ci-test-ubi-image.yml"
      - "examples/multiubuntu/build/**"
      - "pkg/KubeArmorOperator/**"
      - "deployments/helm/**"

# Declare default permissions as read only.
permissions: read-all

jobs:
  build:
    name: Auto-testing Framework / ${{ matrix.os }} / ${{ matrix.runtime }}
    runs-on: ${{ matrix.os }}
    env:
      RUNTIME: ${{ matrix.runtime }}
    strategy:
      fail-fast: false
      matrix:
        os: ["bpflsm"]

        runtime: ["crio"]

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: true

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: "KubeArmor/go.mod"

      - name: Check what paths were updated
        uses: dorny/paths-filter@4512585405083f25c027a35db413c2b3b9006d50 # v2
        id: filter
        with:
          filters: |
            controller:
              - 'pkg/KubeArmorController/**'
            multiubuntu:
              - 'examples/multiubuntu/build/**'

      - name: Install the latest LLVM toolchain
        run: ./.github/workflows/install-llvm.sh

      - name: Compile libbpf
        run: ./.github/workflows/install-libbpf.sh

      - name: Setup a Kubernetes environment
        run: ./.github/workflows/install-k3s.sh

      - name: Generate KubeArmor artifacts
        run: |
          export IS_COVERAGE=true
          GITHUB_SHA=$GITHUB_SHA ./KubeArmor/build/build_kubearmor_ubi.sh

      - name: Build Kubearmor-Operator
        working-directory: pkg/KubeArmorOperator
        run: |
          make docker-build-ubi

      - name: Build multiubuntu docker image
        working-directory: examples/multiubuntu/build
        if: steps.filter.outputs.multiubuntu == 'true'
        run: docker build -t kubearmor/ubuntu-w-utils:latest .

      - name: Build KubeArmorController
        if: steps.filter.outputs.controller == 'true'
        run: make -C pkg/KubeArmorController/ docker-build-ubi TAG=latest

      - name: Run KubeArmor
        timeout-minutes: 7
        run: |
          docker save kubearmor/kubearmor-init-ubi:latest | sudo podman load
          sudo podman tag docker.io/kubearmor/kubearmor-init-ubi:latest kubearmor/kubearmor-init-ubi:latest

          docker save kubearmor/kubearmor-ubi:latest | sudo podman load
          sudo podman tag docker.io/kubearmor/kubearmor-ubi:latest kubearmor/kubearmor-ubi:latest

          docker save kubearmor/kubearmor-operator-ubi:latest | sudo podman load
          sudo podman tag docker.io/kubearmor/kubearmor-operator-ubi:latest kubearmor/kubearmor-operator-ubi:latest

          docker save kubearmor/kubearmor-snitch-ubi:latest | sudo podman load
          sudo podman tag docker.io/kubearmor/kubearmor-snitch-ubi:latest kubearmor/kubearmor-snitch-ubi:latest

          if [ ${{ steps.filter.outputs.controller }} == 'true' ]; then
            docker save kubearmor/kubearmor-controller-ubi:latest | sudo podman load
            sudo podman tag docker.io/kubearmor/kubearmor-controller-ubi:latest kubearmor/kubearmor-controller-ubi:latest
          fi
          if [[ ${{ steps.filter.outputs.multiubuntu }} == 'true' ]]; then
            docker save kubearmor/ubuntu-w-utils:latest | sudo podman load
            sudo podman tag docker.io/kubearmor/ubuntu-w-utils:latest kubearmor/ubuntu-w-utils:latest
          fi

          docker system prune -a -f 
          docker buildx prune -a -f
          helm upgrade --install kubearmor-operator ./deployments/helm/KubeArmorOperator -n kubearmor --create-namespace \
          --set kubearmorOperator.annotateExisting=true \
          --set imagePinning=true \
          --set kubearmor.images.kubearmor.image=kubearmor-ubi \
          --set kubearmor.images.kubearmor.tag=latest \
          --set kubearmor.images.kubearmorInit.image=kubearmor-init-ubi \
          --set kubearmor.images.kubearmorInit.tag=latest \
          --set kubearmor.images.kubearmorController.image=kubearmor-controller-ubi \
          --set kubearmor.images.kubearmorSnitch.image=kubearmor-snitch-ubi \
          --set kubearmor.images.kubearmorOperator.image=kubearmor-operator-ubi

          kubectl rollout status --timeout=5m deployment -n kubearmor -l kubearmor-app=kubearmor-operator

          kubectl get pods -A
          if [[ ${{ steps.filter.outputs.controller }} == 'true' ]]; then
            kubectl apply -f pkg/KubeArmorOperator/config/samples/kubearmor-ubi-test.yaml --dry-run=client -o json | \
            jq '.spec.kubearmorControllerImage.imagePullPolicy = "Never"' | \
            kubectl apply -f -
          else 
            kubectl apply -f pkg/KubeArmorOperator/config/samples/kubearmor-ubi-test.yaml
          fi

          kubectl wait -n kubearmor --timeout=5m --for=jsonpath='{.status.phase}'=Running kubearmorconfigs/kubearmorconfig-test

          while [ ! "$(kubectl wait --timeout=5s --for=condition=ready pod -l kubearmor-app,kubearmor-app!=kubearmor-snitch -n kubearmor >/dev/null 2>&1; echo $?)" -eq 0 ]; do
            kubectl rollout status --timeout=5m deployment -n kubearmor -l kubearmor-app,kubearmor-app!=kubearmor-controller -n kubearmor
            kubectl rollout status --timeout=5m daemonset -l kubearmor-app=kubearmor -n kubearmor
            kubectl rollout status --timeout=5m deployment -n kubearmor -l kubearmor-app=kubearmor-controller -n kubearmor
            kubectl get pods -A
          done

          sleep 10

      - name: make changes in multiubuntu-deployment
        working-directory: ./tests/k8s_env
        if: steps.filter.outputs.multiubuntu == 'true'
        run: |
          grep -rl "kubearmor/ubuntu-w-utils:latest" ./ | while read -r file; do sed -i 's/imagePullPolicy: Always/imagePullPolicy: Never/g' "$file"; done

      - name: Get KubeArmor POD info
        run: |
          DAEMONSET_NAME=$(kubectl get daemonset -n kubearmor -o jsonpath='{.items[0].metadata.name}')
          LABEL_SELECTOR=$(kubectl get daemonset $DAEMONSET_NAME -n kubearmor -o jsonpath='{.spec.selector.matchLabels}' | jq -r 'to_entries[] | "\(.key)=\(.value)"' | paste -sd, -)
          POD_NAME=$(kubectl get pods -n kubearmor -l "$LABEL_SELECTOR" -o jsonpath='{.items[0].metadata.name}')
          echo "Pod: $POD_NAME"
          echo "POD_NAME=$POD_NAME" >> $GITHUB_ENV

      - name: Test KubeArmor using Ginkgo
        run: |
          go install -mod=mod github.com/onsi/ginkgo/v2/ginkgo
          make
        working-directory: ./tests/k8s_env
        timeout-minutes: 30

      - name: Kill KubeArmor process in the pod
        run: |
          echo "Listing all processes in the pod"
          kubectl exec ${{ env.POD_NAME }} -n kubearmor -c kubearmor -- ps aux

          KUBEARMOR_PID=$(kubectl exec ${{ env.POD_NAME }} -n kubearmor -c kubearmor -- \
            sh -c "ps aux | grep '[k]ubearmor-test' | awk '{print \$2}'")

          if [ -n "$KUBEARMOR_PID" ]; then
            echo "Killing KubeArmor PID: $KUBEARMOR_PID"
            kubectl exec ${{ env.POD_NAME }} -n kubearmor -c kubearmor -- \
              sh -c "kill -2 $KUBEARMOR_PID"
          else
            echo "No KubeArmor process found to kill."
          fi

          sleep 10
        env:
          POD_NAME: ${{ env.POD_NAME }}

      - name: Get karmor sysdump
        if: ${{ failure() }}
        run: |
          kubectl describe pod -n kubearmor -l kubearmor-app=kubearmor
          curl -sfL http://get.kubearmor.io/ | sudo sh -s -- -b /usr/local/bin
          mkdir -p /tmp/kubearmor/ && cd /tmp/kubearmor && karmor sysdump

      - name: Archive log artifacts
        if: ${{ failure() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: kubearmor.logs
          path: |
            /tmp/kubearmor/
            /tmp/kubearmor.*

      - name: Run cleanup
        if: ${{ always() }}
        run: ./.github/workflows/cleanup.sh
