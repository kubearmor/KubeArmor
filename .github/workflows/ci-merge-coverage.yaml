name: ci-merge-coverage

on:
  workflow_run:
    workflows: [ci-test-ginkgo]
    types:
      - completed

permissions: {}

jobs:
  merge-coverage-files:
    name: Download and merge files
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: true

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: "KubeArmor/go.mod"

      - name: Check if all required workflows completed successfully
        id: check-workflows
        run: |
          workflows=("ci-test-ginkgo")
          all_completed=true

          commit_sha="${{ github.event.workflow_run.head_sha }}"

          for workflow in "${workflows[@]}"; do
              safe_name="${workflow//-/_}"
              conclusion=$(gh run list --workflow=${workflow}.yml --json conclusion,headSha,event \
                | jq -r --arg sha "$commit_sha" \
                '.[] | select(.headSha == $sha) | .conclusion' | head -1)

              if [[ -z "$conclusion" ]]; then
                  conclusion="pending"
              fi

              if [[ "$conclusion" != "success" ]]; then
                  all_completed=false
              fi

              echo "${safe_name}_status=$conclusion" >> $GITHUB_ENV
          done

          if [[ "$all_completed" == "true" ]]; then
              echo "All workflows completed successfully for commit $commit_sha."
              echo "all_succeeded=true" >> $GITHUB_ENV
          else
              echo "Not all workflows completed successfully for commit $commit_sha."
              exit 1
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download k8s coverage files from ci-test-ginkgo
        if: ${{ env.ci_test_ginkgo_status == 'success' }}
        uses: dawidd6/action-download-artifact@bf251b5aa9c2f7eeb574a96ee720e24f801b7c11 # v6
        with:
          workflow: ci-test-ginkgo.yml
          name: coverage.*
          path: KubeArmor/
          name_is_regexp: true
          search_artifacts: true

      - uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
